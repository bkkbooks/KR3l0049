body:
  text: 泊宅編小說家𩔖一雜事之屬提要臣等謹案泊宅編三卷宋方勺撰勺字仁聲婺州人元祐中蘇軾刺杭州值省試嘗以勺名薦送勺遂遊軾之門後徙居湖州之西溪有張志和泊舟處後人以志和有泛宅浮家之語因謂之泊宅村勺寓居其間自號泊宅翁浙江通志載潘良貴嘗稱勺超然遐舉神情散朗如晉宋間髙士似以肥遯終身者而書中有一條記䖍州龍南安逺二縣有瘴因自述其管勾常平季㸃到邑事則亦曾官於江右者也宋史藝文志載勺泊宅編十卷此本僅三卷乃明商濬録入稗海中者葢刋刻時已有所合併矣所載皆元祐迄政和間朝野舊事勺既為蘇軾弟子於王安石張商英輩皆有不滿之詞宗澤乃其鄉里而徽宗時功名未盛故勺頗譏其好殺是非未必盡允然其間遺聞軼事摭拾甚多亦考古者所不廢書中間有附注如教授誤據建板坤為金一條言不欲顯其姓名而下注姚祐尚書也五字又秦觀贈妓陶心詞一條下注云此乃誤記東坡詞云云此𩔖似非勺之自注然詳其詞氣當亦宋人手筆則由来已久矣乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d1259f6fd1b12cbeeffc6d8944b0a3e7c068c8d7e93e557324011a66c0772d2f
