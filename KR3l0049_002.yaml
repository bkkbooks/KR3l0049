body:
  text: 泊宅編卷中宋方勺撰古法鑿井者先貯盆水數十置所鑿之地夜視盆中有大星異衆星者必得甘泉范文正公所居宅必先浚井納青术數斤於其中以辟瘟氣海毁朝廷下祭法三牲之外别用頭巾芒鞋布襦及推沙板各一百二十九毁止則沙漲其處元豐初盧秉提點刑獄會朝廷議鹽法秉謂自錢塘縣楊村上流接睦歙等州與越州錢清場等水勢稍淡以六分為額楊村下接仁和縣湯村為七分場官場為八分並海而東為越州餘姚縣石堰場明州慈溪縣鳴鶴場皆九分至岱山昌國又東南為溫州雙穗南天富場北天富場十分著為定數蓋自岱山及二大富皆取海水煉鹽所謂熬波者也自鳴鶴西南及湯村則刮鹻以淋鹵以分計之十得八九而以鹽官湯村及錢清場織竹為盤塗以石灰故色少黃竹勢不及鐡則黃色為嫩青白為上黑即多鹵或有泥石不宜久停若石堰以東雖用竹盤而色不白以近海水鹹故亦佳後來法雖少變公私所便大扺不易盧法且水性以潤下為鹹其勢不曲折則終不可成鹽安邑鹽池以濁河曲折故因終南山南風以成若明越溫杭秀泰滄等州為海水隈奧曲折故可成鹽其數亦不等唯隈奧多處則鹽多故二浙産鹽尤盛他路自溫州界東南止閩廣鹽升五錢比淮浙賤數倍蓋以東南最逼海潤下之勢既如此故可作而為鹹不必曲折也泉州東二十里有萬安渡水濶五里上流接大溪外即海也每風潮交作輒數日不可渡劉鋹據嶺表留從效等據漳泉恃此以負固蔡襄守泉州創意造石橋兩岸依山中託巨石因搆亭觀纍石條為橋基八十所濶二丈其長倍之兩頭若圭射勢石縫中可容一二指釃潮水每基相去一丈四尺橋面濶一丈三四尺為兩欄以護之閩中無石灰燒蠣殼為灰蔡公於橋岸造屋數百楹為民居以僦其直入公帑三嵗度一僧俾掌橋事故用灰常若新無纎毫罅隙春夏大潮水及欄際往來者不絶如行水上十八年橋乃成即多取蠣房散置石基上嵗久延蔓相粘基益膠固矣元豐初王祖道知州奏立法輒取蠣者徒二年西安州即唐鹽州西至流沙六日沙深細沒馬脛無水源但乾沙爾又二日至西海水味不甚醎中有一顆大者重三四斤其色紅瑩軍中以和食飲西安州有池産顆鹽周回三十里四旁皆山上列徑兵屯守池中役夫三千餘皆悉亡命卒也日支鐡錢四百每多竊鹽私貿蓋絶塞難得鹽自熙河蘭鄯以西仰給於此初得此地其人嵗入寇今則拓地六十里斥候尤謹邊患遂絶漢法聘后用黃金二萬斤為錢二萬萬而寶貸法凡黃金一斤直錢萬朱提銀八兩為一流直錢一千五百八十餘銀一流直錢千朱提縣出善銀音殊時當時黃金一兩才六百銀一兩才二百東坡常怪今之黃金不若昔之多豈今之糜之者衆宜其少而價貴也班固食貨志云一夫治田百畝嵗收粟百五十石石三十至宣帝時選用良吏民安土嵗豐穰穀至石五錢而莽末盜賊起穀價翔貴洛陽以東米石二千大抵漢之糴價至賤則穀石五錢至貴不過米石二千蓋榖石三十乃常價也以古觀今何懸絶如此江湖間米直比二十年前倍貴他物稱是所以致此豈無説必有能言之者矣漢法官至二千石月得米一百二十斛俸錢萬二千古之升斗小今之升斗大量酒之升斗小量穀之升斗大昔人飲酒有數石不亂者班固論一夫百畝所收之粟人食月一石五斗古之人亦今之人也豈有一人能飲數石而食五升米乎無是理也前史稱漢文帝節儉身衣弋綈集上書囊為殿帷所幸慎夫人衣不曵地此三事以人主行之可謂陋矣然賜鄧通以十數巨萬又以銅山與之此又何也七閩地狹瘠而水源淺逺其人雖至勤儉而所以為生之具比他處終無有甚富者墾山壠為田層起如階級然每援引溪谷水以灌溉中塗必為之磑下為碓米亦能播精播精為去其粳粃以水運之正如人為其機巧如此也朱行中知泉州有水無涓滴不為用山到崔嵬盡力耕之詩蓋紀實也湖口李正臣所蓄石東坡名以壺中九華者豫不及見之但嘗詢正臣所刻碑本雖九峰排列如雁齒不甚崷崒而石腰有白脈若束以絲帶此石之病不知坡何酷愛之如此欲買之百金豈好事之過乎豫恐詞人筆力有餘多借假物象以發文思為後人詭異之觀爾閩廣多種木綿樹高七八尺樹如柞結實如大麥而色青秋深即開露白綿茸茸然土人摘取出殼以鐡杖捍盡黑子徐以小弓彈令紛起然後紡績為布名曰吉貝今所貨木綿特其細緊爾當以花多為勝橫數之得一百二十花此最上品海南蠻人織為巾上作細字雜花卉尤巧工即古所謂疊巾也李琮詩有腥味魚中墨烏賊魚也衣裁木上綿之句螺填器本出倭國物象百態頗極工巧非若今市人所售者國家百二十餘年竒器異物珍卉怪石法書名畫悉歸於上四方梯航殆無虛日大則寵以爵祿其次賜賚亦稱是宣和五年平江府朱勔造巨艦載太湖石一塊至京以千人舁進是日賜銀碗千并官其家僕四人皆承節郎及金帶勔遂為威逺軍節度使而封石為盤固侯鹽官縣安國寺雙檜有唐宣宗時悟空大師手植今百餘年矣其大者蜿蜒盤礴如龍鳳飛舞之狀小者與常檜不甚異宣和乙巳春朱勔遣使臣李蠲取以供進大者載由海道遇風濤舟檜皆沒小者只自漕路入既獻上蠲轉二官知縣鮑慎好賜緋虔州龍南安逺二縣有瘴朝廷為立賞添俸甚優而邑官常缺不補他官以職事至者卒不敢留甚則至界上移文索案牘行遣而已豫管勾常平季點到邑皆留數日亦無他苦大抵此地惟水最毒常以銅盆貯水須臾銅色微黑豫每以大錫瓶挈佳泉以自隨捐二夫之力足了數日之食虞䇿處瘴鄉有詩云避色如避難冷暖隨時換少飲卯前酒莫喫申後飯豫謂果能如此何所往而不可豈獨禦瘴癘而已哉越州禹廟元圭匱藏之色黑如磬徑五寸厚寸餘肉好相倍上下有郡將掌封鑰天禧初滑州河決已塞惟龍門未合忽有大風門鼓沙起如連岡勢於未合處淤定於是人得致力而畢工贑石數百里之險天下所共聞雨少溪淺則舟舫皆艤以待有數月者處之水東有慶顯廟甚靈或至誠禱之則一夕為漲水數尺送舟出石以識於廟廷者甚多東坡北歸亦然行次清都觀有自笑勞生清底物半篙清漲百灘空之句龍王本廟在樵舍乃洪州南康軍之間規模不甚壯麗而遺構最古士大夫及商旅過者無不殺牲以祭大者羊豕小者雞鵝殆無虛日豫見縳致庭下宛轉將就烹直不忍視竊思此廟血食已來其所殺不知紀極如使其神一旦素食亦享肉食亦享但以誠心至皆享之則物所全命亦不知紀極功豈小哉其神豈不又靈哉越州上虞縣曹孝女墓在江岸上有大木二株一榮一枯榮者枝幹宛轉枯木外若抱父尸之狀虞經臣䇿元祐五年作監察御史是時察官亦許言事尋擢侍御史不歷殿院至紹聖改元移起居郎明年遂為給事中初入臺值都城開渠忽有異犬自渠中出直入其家馴服若素畜養者家人輩愛之名曰渠來但無事惟喜睡或亂毁簾幃窗牖之類則經臣必有遷改錫賚之慶自爾每遇慶事則贈以肉一斤渠來必歡喜跳躍然後食之以為常凡數年經臣卒前一夕渠來死山隂蘭亭有逸少硯池寺曰天章以藏真廟御製故也當時朝廷每有頒詔禮則池水盡黑可以染緇太常少卿沈紳常記其事明州有僧佯狂頗言人災福時號癲僧睦州王君儀才弱冠寓陸農師門下力學攻文鋭意應舉至忘寢食一日癲僧來託宿陸公曰王秀才雖設榻不曾睡可就歇息明日僧夙興見君儀猶挾䇿窗下睥睨而言若要官須四十九嵗君儀聞之頗不懌其後纍應舉盡不偶直至四十八嵗又夢癲僧笑而謂曰明年做官矣是時癲僧遷化已久而來年又非唱第之年君儀頗惻然嵗籥一新陸公入預大政既對首薦君儀遂除湖州學教授君儀嘗謂豫云欲遊四明求師遺事為作傳以報之而未能也婺州有僧嗜豬頭一噉數枚俗號豬頭和尚莫測其人祥符寺轉藏成僧俗設齋以落之一僧丐齋衆見其藍縷不加禮拂袖而去或曰此豬頭和尚也使人邀請指大藏曰我不轉此藏亦不轉衆聞其語異相率自追之僧曰要我轉更三十年去竟不顧而去之三衢之守饌豬頭召師食自窗牖窺之見一鬼從旁食師無預焉守以告之師尋坐亡衢人奉香火良謹有禱輒應一日見夢於人曰吾將還鄉矣蓋自師之出至是恰三十年寂無施金轉藏者故老憶師言相與備禮迎師真身歸至藏院郡人輻湊日獲數千此寺齋供遂為長堂豫時僑寓親覩盛事因閲師辭世頌知是定光佛也大通禪師善本退居龍山時節度使呂吉甫帥杭州暇日常見師入山舂容道論頗似契合後有問師吕太尉如何擺頭曰無力臘月三十日要你有力圓照禪師宗本常語人曰我不勸你出家學佛只勸你惜福修行大通常語人曰我只勸你生處放教熟熟處放教生大通乃圓照弟子時稱吳中二本王溈之字彥祖為西京小漕攝河南府事因丁外艱置神柩西堂一日有雀羣集几筵啄踐祭食彥祖揮去復來彥祖頗不平偶撲得一雀自於門限刀斷其首擲棄中庭徐察之此雀忽身首相就翩然飛去及彥祖還南徐為人訟田安置廣德軍才得自便復喪妻許未幾妖人張懷素辭連就逮竟死於南方雖禍生有胎然忿與忍不可不戒也范迪簡南劒州人起白屋官至卿監年八十餘諸子自洞峋以下皆登科顯官近世享福殆少其比其居地名黯淡灘初買宅或云其中有怪不可買試使健僕宿其堂廡伺之但見一物人首而蛇身往來其間不甚畏人諸僕遂謀以布被兜之急縳就烹一夕而盡其怪遂絶或云此喪門也陸軫云東封榜狀元梁固作省判卒附一婢言已授隂山諫議大夫索茶喫却封角子押字如生時又云欲取寵婢及一小鬟不久二婢皆卒陸軫云歷亭縣李押司死時復蘇寄一姓蘇人還魂本家不肯認蘇氏又不肯往遂詣縣訴有司以涉怪抑而不奏世云借尸還魂信有之耶奉議李畤婺州人守官江外得替北歸次金陵忽小龍見於舟中急以銅盤承之整衣冠焚香設拜明日視之小龍已僵死盆中畤尋病至真州卒樞密蔡公卞只一子名仍今為顯謨閣待制初公出帥五羊道由無錫縣挈家遊惠山時邑人楊生與數僧間步佛殿聞公來戲謂諸僧曰蔡侍郎無子吾與之為子矣公至廣之明年生仍不久移知會稽遂還朝仍已三嵗途次無錫悟前生之為楊生因召楊生二子曰陟曰升者問其父死之日乃仍生之時然二日後復問仍以夙昔事輒懵然不能言矣蔡楊至今往來如姻眷奏陟將仕郎前世書法名畫有傳之祕閣者謂之閣本流俗看畫但云閣本則翕然稱美范文正公知睦州奏以唐處士方干配嚴光位干為御史方蒙逺祖下鸕鷀原御史所居取畫像家無以塞命鄉人但塑一幅巾道服者置之祠中元祐間有旨下諸郡取前賢所寫真令所在如法圖進睦守以嚴方應詔後人見玄英之像豈不謂之閣本哉謂太守為五馬者多疑所出據詩孑孑干旟良馬五之鄭氏云建旟州長之屬殆以是乎聮句或云起於柏梁非也式微詩曰胡為乎中露蓋泥中中露衛之二邑名劉向以為此詩二人所作則一在泥中一在中露其理或然則此聮句所起也世言行李出左氏杜預注云使人也唐李濟翁云當作行使豫以謂史記臯陶為大理一本作大李天官書曰熒惑為李徐廣注曰外則理兵內則理政又黃帝有理法一篇顔師古注曰李者法官之號總兵刑政故其書曰理法則理與李其義自通蓋人將有行必先治裝如孟子之言任鄭當時之言治行皆治裝之意然則理亦治也今以行李名裝何為不可詩南陔孝子相戒以養陔何以有戒意據周官裓夏儀禮作陔字則陔通於裓且辰窮於亥是戒之時也李濟公曰按王府親書杜元凱遺其子書曰書勿借人古人云借書一嗤還書二嗤嗤笑也後人訛為癡字而增至四癡謂借一癡借之二癡索三癡還四癡皆濟翁云前輩又以癡為瓻瓻酒器也蓋云借書以一瓻酒還之亦一瓻酒通作鴟吳王取馬革受子胥沈之江顔師古云即今之盛酒鴟夷幐今州縣獄皆立臯陶廟以時祠之蓋自漢已然范滂繫獄吏俾祭臯陶曰臯陶賢者知滂無罪將理之於帝如其無知祭之何益臯陶大理善用刑故後享之今西北屠者皆祭樊噲又可笑也興化軍子魚惟通應大師廟前者最美世稱通應子魚而東坡乃作通印子魚恐誤政和丙申嵗杭州湯村海溢壞居民田廬凡數十里朝廷降鐡符十道以鎮之壬寅嵗鹽官縣亦溢縣南至海四十里而水之所囓去邑聚財數里邑人甚恐十一月鐡符又至其數如湯村每一符重百斤正面鑄神符及御書咒貯以青木匣府遣曹官同都道正管押下縣縣建道場設醮投之海中海溢又謂之海嘯史只云海毁河決湍水卷岸而入海但潮浸陸地爾通州靜海縣舊去海七十里今止十里宣和癸卯鹽官縣蜀山雷山一帶沙漲而靜海並海十里內沙再毁初鹽官自投符後稍稍沙漲前此經制司差一武經郎路升措置水利乃欲築長堤以捍潮勢其論尤迂誕杭帥翁彥國笑曰平生且不曾見人修海番陽吳令知靈璧縣朝廷定樂下縣造石磬聲成每泝汴進入輸納縣别有一小河號取成都稍徑或由此河載磬以入則磬聲率不協律此理殆不可曉陸軫云天禧元年四月五日申時京師黑風自西來天地陡暗市人咫尺不相見頃之大雨作天復明父老云往年疾疫起得黑風而人民安豫紹聖間迎侍西湖圃居五年春圃桃數千株結實皆雙明年先子捐館今直龍圖閣李友聞時亦居杭聞之愀然曰某頃時為婺州録事參軍廨中櫻桃一株盡雙實亦丁外艱松楸上忽生大青蟲食盡葉惟留大枝幹近見鎮江一士大夫先冢如此蓋不祥也成都府園西樓有大蟒居之不敢發率嘗扄鎖虞經臣作帥宴客樓下蟒忽著正中一武臣之肩須臾溺皮肉潰爛成瘡得妙藥治之方愈經臣為文遣吏祭之即日毁樓蟒亦不見宣和己亥夏吳中雨下如黑色明年乃有青溪之變舒王一日與葉濤坐蔣山本府一牙校來參公問來意其人乞屏左右言昨夕夢至隂府見待制帶鐡枷良苦令某白相公意望有所薦拔某恐相公不信遲疑間待制云但説某時某處所議之事今坐此備受慘毒公悟其事不覺大慟公既薨有武辨死而復蘇言王氏父子皆鐡枷竊問何罪曰緣曾議復肉刑致此乃與前校之夢略同今士大夫往往皆知之崇寧中蔡太師罷歸浙西張康國將有入相之命未鎖院前一夕薨是時術士謝詮居閩中忽夢至一所門墻甚峻門外呵衛者甚衆詮問此何處傍有人指曰請視牌詮仰首見牌惟二字曰機獄相次門開有執兵持撾者數百人次列門下聲言迎罪人須臾望一物火焰赫然迤邐來近乃一鐡車載火一盆及一人帶鐡枷居火之後詮熟視其人乃康國也是日乃四月某日尋知康國是日薨矣朝奉郎李遘知興化軍時蔡君謨襄自福帥尋罷歸鄉病革以後事屬李守守夜夢神人紫綬金章從數百鬼物升廳與守云迓代者守問何神代者復何人神曰豫閻羅王蔡襄當代我明日蔡公薨李作挽詞有不向人間為冡宰却歸地下作閻王之句蓋實録也狀頭時邦彥母懷之彌月夢九人皂衣肩輿一金紫人徑入房中明日犬生九子皆黑晚遂生邦彥故小名十狗同年録見之終於吏部尚書東臯録載其父有隂德事甚詳從事郎林毅本閩人寄居姑蘇往嵗權知錢塘縣值睦寇作棄官逃避得罪投間宣和六年既敘復將赴調忽夢黃衣吏持文書一卷列十人姓名林在其中謂林曰召公等作酆都使者請書知林視餘人往往相識而俱未書名乃語俟九人皆僉字然後及我吏曰諾月餘又夢如前而九人皆已書押林遂書之他日以告所親咸竊憂之相次所謂九人者已二三死矣林不以為異方治任西遊至泗州卒從政郎任揖初聞林説戲曰公果作使者幸一顧我林卒未久任亦殂謝彭汝礪番陽人元祐末自八座出知江州與婦翁宋朝散之官朝散忽夢上天令作文記遽答曰某不能詔召尚書為之未幾尚書卒其夫人宋氏尚少艾臨終於其領巾留頌為别云百世因緣六年夫婦從今已去不打這鼓福州近郊幽嵓院資産甚盛有大麵牀號千人麵牀君謨作帥因聖節宴犒遣人舁置使厨久之院僧禱護伽藍春會動無麵牀何以聚衆施利不至神亦何依一夕公獨坐便齋聞喏聲不見形問何人神對幽嵓院每嵗恃春會以贍衆願請麵牀以歸公頷之明日公庫半夜失麵牀公令問幽嵓果已還院郡人莫不異之泊宅編卷中
