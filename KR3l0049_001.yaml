body:
  text: 泊宅編卷上宋方勺撰東坡既就逮下御史府一日慈聖曹太后語上曰官家何事數日不懌對曰更張數事未就緒有蘇軾者輒加謗訕至形於文字太后曰得非軾轍乎上驚曰娘娘何以聞之曰吾嘗記仁宗皇帝䇿試制舉人罷歸喜而言曰朕今日得二文士謂蘇軾轍也然吾老矣慮不能用將以遺後人不亦可乎因泣問二人安在上對以軾方繫獄則又泣下上亦感動始有貸軾意司馬溫公嘗言范景仁之勇决吕獻可之先見吾弗如也或問先見何事公曰頃嵗獻可先見吾一日並轡入朝問獻可今日所論何事乎云將攻新參新參者王介甫也是時介甫新入政府其所欲變更之事未甚著而獻可排之甚力然其辭不過曰外示朴野中懷險詐學師孔孟術慕管商而已當時雖溫公亦以獻可言之之過也公在翰苑時嘗飯客客去獨老蘇少留謂公曰適坐有囚首喪面者何人公曰王介甫也文行之士子不聞之乎介甫不修飾故目之囚首喪面洵曰以某觀之此人異時必亂天下使其得志立朝雖聰明之主亦將為其誑惑內翰何為與之游乎洵退於是作辨姦論行於世是時介甫方作館職而明允猶布衣也明允即老泉也楊孝本字行先居䖍州城西一圃甚幽邃學博行高東坡謫惠州過而愛之為留月餘號曰玉岩居士仍作真贊居士平生不娶坡每來謁直造其室嘗戲以元德秀呼之居士曰某乃陽城之裔故坡詩曰衆謂元德秀自稱陽道州皆謂無妻也居士後以經明行修得官太學年七十乞致仕朝廷寵以奉議郎直祕閣俾領宫祠以歸豫嘗從之最䝉愛照臨别相送舟次至垂涕云居士貧而好收書晚得妾生二子每拊其首曰吾惟有書數千卷遺汝吳師仁字坦求錢塘人篤學勵志不事科舉陳襄鄧溫伯蒲宗孟皆以遺逸薦於朝元祐初被召命以學坦求平生不問卜中年喪親廬其墓日託棲真寺僧造飯一鉢以禦饑不復置庖㸑蓄奴婢閉門翛然讀書倦則默坐而已嘗一室忽自明有僧長揖而入與坐談𤣥久之謂坦求曰教授行且仕進壽不過六十僧去而復暗如初坦求為太常博士凡十年無他改除其後以久次移潁州吳王教授卒年五十七果至符教授之稱先子既老迤邐還浙豫偶至杭創小圃在清波門外去城十里許稍加葺治迎侍來居二年而先子捐館後因閲遺藁見先子未第時有贈吳興朱臨詩斷章云安得斷茅環堵地漁樵終老繼清風初以謂先子慕朱早退故有是句也後與前輩語方知是圃乃鮑當郎中故居鮑有詩編名曰清風集時號鮑清風而正夫頃亦曾寓此肄業先子終老有繼清風之兆已見於布衣時矣王升字君儀居烏龍山布衣蔬食無書不讀道釋二典亦皆閲過晚為湖婺二州學官罷歸山中杜門二十年不赴調一日以箕子易筮之始治裝西去時年將六十矣旅京師數月良倦將謀還鄉左丞薛昂以其所撰冕服書獻之太師蔡京蔡因薦之上遂類編御筆手詔稍歷要官君儀平生尤深於禮易嘗云數年承令禮局及明堂司常頗得究其所學云朱行中自右史帶假龍出典數郡是時年尚少風采才藻皆秀整守東陽日嘗作春詞云小雨纎纎風細細萬家楊栁青煙裏戀樹濕花飛不起愁無比和春付與東流水九十光隂能有幾金龜解盡留無計寄語東流沽酒市拚一醉而今樂事他年淚豫以門下士每或從容公往往乘醉大言你曽見我而今樂事他年淚否蓋公自為得句故誇之也豫嘗心惡之而不敢言行中後歷中書舍人帥畨禺遂得罪安置興國軍以死流落之兆已見於此詞王欽臣自西京一縣令召入議法與舒王不合令學士院試賦一篇但賜出身却歸本任獻舒王二首頗為婉雅其一蜀國相如最好詞武皇深恨不同時凌雲賦罷渾無用寂寞文園意可知其二古木隂森白玉堂老來方此試文章宫簷日永揮毫罷閒拂塵埃看畫墻東坡帥杭一日與徐璹坐雙檜堂指二檜吟曰二疏辭漢去時以兄弟皆補外喻也璹應聲曰大老入周來對偶既親切又善迎合公大喜徐璹字全夫踈俊不事事少年登科晚益流落終於武義縣主簿嘗寓婺州清漣寺醉中走筆題詩寺壁曰驚雷殷殷南山曲一夜山前春雨足美人睡起怯餘寒衣褪香消紅减玉朝雲靄靄弄晴態野栁狂風無管束東風也自足春情吹破雨溪煙水緑秦觀字少游嘗眷蔡州一妓陶心者作浣紗溪詞中二句缺月向人舒窈窕三星當戶照綢繆缺月三星蓋心字愛其善狀物故書之此乃誤記東坡詞耳少游詞云一鈎殘月帶三星也元祐中東坡帥杭豫自江西來應舉引試有日矣忽同保進士訟豫戶貫不明賴公照憐得就試因預薦送遂獲游公門公嘗云王介甫初行新法異論者譊譊不已嘗有詩云山鳥不應知地禁一逢春暖即啾喧古詩有鳥鳴山更幽更作一鳥不鳴山更幽誠有㫖哉先生晚官鄧州一日秋風起思吳中山水嘗信筆作長短句名黃鶴引遂致仕其序曰豫生浙東世業農總角失所天稍從里閈儒者遊年十八婺以充貢凡八至禮部始得一青衫間關二十年仕不過縣令擢才南陽教授紹聖改元實六十五嵗矣秋風忽起亟告老於有司適所願也謂同志曰仕無補於上下而退號朝士婚姻既畢公私無虞將買舟放浪江湖中浮家泛宅誓以此生非太平之幸民而何因閲阮田曹所製黃鶴引愛其詞調清高寄為一闋命稚子歌之以侑樽焉詞曰先逢垂拱不識干戈免田隴士林書圃終年庸非天寵才初闒茸老去支離何用浩然歸算似黃鶴秋風相送塵事塞翁心浮世莊生夢漾舟遙指煙波羣山森動神閒意聳回首利鞿名鞚此情誰共問幾許淋浪春甕歐陽公作醉翁亭記後四十五年東坡大書重刻於滁改泉冽而酒香作泉香而酒冽馮當世未第時客餘杭縣為官逋拘窘計無所出悶題小詩於所寓寺壁一胥魁范生見之為白縣令丐寬假令疑胥受賕游說胥云馮秀才甚貧但見所留詩他日必貴顯因誦其詩令遽釋之詩云韓信棲遲項羽窮手提長劔喝西風可憐四海蒼生眼不識男兒未濟中舒王嘗戲作急足集句云年去年來來去忙傍他門戶傍他墻一封朝奏緣何事斷盡蘇州刺史腸王欽臣除太僕卿東坡賀啓有云萬事不理問伯始而可知三篋若亡賴安世之猶在其後孔平仲賀蘇子容頌吏部尚書復云萬事不理當問胡公三篋若亡請詢安世韓退之多悲詩三百六十首哭泣者三十首白樂天多樂詩二千八百首飲酒者九百首豫只一弟陶字仁夫博學好古未壯而卒平生不曽見其所為文既卒於其篋中得跋尾遺藁嗚呼觀其筆力古人豈難到哉今載於此秦詛楚文跋尾曰右秦巫咸碑在鳳翔府學又一本告亞駝神者在洛陽劉忱家書辭皆同惟偏傍數處小異按史記世家楚子連熊於名者二十有二獨無所謂熊相以事考之楚自成王之後未嘗與秦興難及懷王熊槐十一年蘇秦為合從之計六國始連兵攻秦而楚為之長秦出師敗之六國皆引而歸今碑文熊相率諸侯之兵以加臨我者真為此舉蓋史記誤以熊相為槐耳其後五年懷王忿張儀之詐復發兵攻秦故碑文云今又悉興其衆以逼我邊境也是嵗秦襄王二十六年也王遣庶長章邯拒楚師明年春大敗之丹陽遂取漢中之地六百里碑云客劑楚師復略我邊城是也然則碑之作正在此時蓋秦人既勝楚而告於諸侯之文也秦人嘗與楚同好矣楚人背盟故秦人嫉之幸於一勝遍告神明著諸金石以垂示後世何其情之深切一至於此歟余昔固嘗怪秦楚虎狼之國其勢若不能並立於天下然以此鄰壤之近十八世之久而未嘗以弓矢相加及得此碑然後知二國不相為害乃在秦盟詛之美姻婚之好而已戰國之際忠信道喪口血未乾而兵難已尋者比比皆是而二國獨能守其區區之信歷三百餘嵗而不變不亦甚難得而可貴乎然而史記及諸傳記皆不及之也碑又云熊相背十八世之詛盟今世家所載自成王至熊相才十七世爾又云楚取我邉城新隍及栁長而史記止言六國退敗而已由是知簡䇿之不足盡信而碑刻之尤可貴也秦惠公二十七年周赧王之三年也自碑之立至今紹聖改元一千四百四十年石經跋尾云石經殘碑在洛陽張景元家世傳蔡中郎書未知何所據漢靈帝熹平四年雍以古文𨽻三體書五經刻石於太學至魏正始中又為一字石經相承為之七經正字今此所傳家一體𨽻書必魏世所立者然唐經籍志又有雍金字論語二卷豈雍五經之外復為此乎據隋經籍志凡言一字石經皆魏世所為有一字論語二卷不言作者之名而唐遂以為蔡雍所作則又疑唐史傳之之誤也蓋自北齊遷雍石經於鄴都至河濱岸崩石沒於水者幾半隋開皇中又自鄴運至長安未及緝理尋以兵亂廢棄唐初魏鄭公鳩集所餘十不獲一而傳拓之本猶存祕府前史所謂三字石經者即雍所書然當時一字石經存者猶十數卷而三字石經止數卷而已由是知漢經之亡久矣不能若此之多也魏石經近世猶存至五代湮滅殆盡往年洛陽守因閲營造司所棄碎石識而收之遂搜訪凡得尚書儀禮論語合數十段又有公羊碑一段在長安其上有馬日磾等名號者魏世用日磾等題名本在禮記碑而此乃公羊碑上益知非雍所為也尚書論語之文與今多不同者非孔安國鄭康成所傳之本也獨公羊當時無他本故其文與今文無異然皆殘缺已甚句讀斷絶一篇之中或不存數字可勝嘆惜哉豫嘗謂物之不幸者莫甚於書自隋牛洪已言書有五厄由洪至今其厄又可知夫著之金石宜若可傳於無窮而不幸且如是至於二氏荒唐亂世之言晏然享天下厚奉歷千有餘嵗而未聞遭詆訶之厄彼亦何幸而至此豈天終不佑吾道耶吾友鄧人董堯卿自洛陽持石經紙本歸靳然寶之如金玉而豫又從而考之其勤如是豫二人亦可謂有志於斯文矣紹聖甲戌秋八月題天禧二年開府解榜出有廖復者被黜率衆詣鼓院訴有司不公朝廷差錢惟演等重考取已落者七十餘人復亦預薦時號還魂秀才前發解官皆謫外郡當明年殿前放狀元王整以下及第是時衢睦二州各有一王言待唱初喚王言賜進士及第乃衢人久之又喚一王言上問其鄉貫知前賜第者合是睦人而衢州者只合得進士出身及再喚二人審問衢人奏懇念臣已謝聖恩遂只賜睦州者同出身而已明日忽有㫖賜睦州王言進士及第自後殿前唱名必傳呼某人某州以防差互出睦軨日記符建間有杭州學教授出易題誤寫坤為釡作金字一學生知其非佯為未喻懷經上請教授因立義以酬之生徐曰先生所讀恐是建本據此監本乃是釡字教授大慙鳴鼓自罰二直無名子以十七字詩云教授太昏沉將釡却為金萬福你說易龔深龔原字深之縉雲人嘗著易書舒王稱之後學之所宗也然教授者不久遂歷清要官至八座近方殂謝不欲顯其姓名於此姚祐尚書也崇寧五年長星見蔡太師斥居浙西時事小變士大夫觀望或於秉筆之際有向背語蔡既再相門人有張軾者自潭州教授召赴都堂審獻乞索天下學官五年所撰䇿題下三省考校以定優劣坐是停替者三十餘人軾為太學博士遷司業卒舊制直龍圖閣謂之假龍龍圖閣待制謂之小龍龍圖直學士謂之大龍龍圖閣學士謂之老龍然帶此職例呼龍圖近嵗本閣學士朝廷尤重之少曾除授有授此職者遂呼龍圖近嵗除直祕閣者尤多兩浙市舶張苑進篤祿香得之時號篤祿學士運判蔣彛應副朱冲葬事得之號仵作學士越州通判魏志崇獲盜黃烏觜得之號賊學士今之巧宦有以貨取者皆謂之鑽班固云商鞅挾三術以鑽孝公今官有不振職者許郡將部使臣兩易其任謂之對移漢薛宣為左馮翊以頻陽令薛恭本係孝亷未嘗知治民而粟邑令尹賞久用事宣即奏賞換縣狄武襄公青本拱聖兵士纍戰功致樞府既貴時相或請去其靣文者但笑不答仁廟亦宣諭之對曰非不能姑欲留以為天下卒之勸上由此益愛之宗澤婺州農家子登進士科任館陶尉凡獲逃軍即殺之邑境為之無盜時吕大資惠卿帥大名聞其舉因召與語仍薦之且戒云此雖警盜賊之一䇿恨子未閲佛書人命難得安可輕殺况國有常刑乎河陽三城其中城曰中灘音誕黃河兩𣲖貫於三城之間秋水泛溢時南北二城皆有濡足之患惟中灘屹然如故相傳此灘隨水高下若所謂地肺浮玉者楞嚴經云乾為洲灘濕為巨海烏程縣之東數十里有泊宅村時人不曉泊宅之義豫寓居之明年買田適在村下因閲金石遺文昔顔魯公守湖州張志和浮家泛宅往來苕霅間此乃志和泊舟之所也續仙傳云志和越人而唐史以為婺人豫喜卜築之初聞同里之高風遂得友其人於千載因作詩識之王侍郎漢之一見而號豫泊宅之少翁仍為贊曰形色保神環無初終粉飾大鈞而為之容是曰泊宅之少翁唐李一品貴極當時嘗為滁州刺史作懷嵩樓西城上刻文於石以懷嵩洛有白雞黃犬之嘆後竟以謫死樓有公畫像頎然六尺真偉人也但鼻端微曲耳秦之長城西起臨洮盡遼海今但穴其下來往望之若紫橫亘沙漢上自登州岸一潮渡海即至島島有五所即禹貢之羽山西海梅福自九江尉去隱為吳門卒今山隂有梅市鄉山曰梅山即其地也吳伯舉舍人知蘇州日謁告歸龍泉遷葬母夫人已營墳矣及啓堂殯見白氣氤氲紫藤繞棺急復掩之術人視殯處知是吉地因即以為墳然頗悔之舍人竟卒於姑蘇㑹稽山為東南巨鎮周回六十里北出數隴葬者紛紛得正隴者趙陸二祖墳而已二墳下瞰鑑湖湖外有山橫抱如几案案之外尖峰名梅里尖地理家謂之文筆案陸氏葬後六十年生孫佃為尚書左丞趙氏葬後八十年生孫抃為太子太師陸公贈太保趙公贈少保二隴同一山而有曾孫追賁於九泉盛哉泊宅編卷上
