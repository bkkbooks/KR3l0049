body:
  text: 泊宅編卷下宋方勺撰朱曉容不詳何許人常為浮屠以善相游公卿間號容大師後因事返初惟貢作貴人他人雖强之使言終非所喜而中者亦寡初朱臨姚闢久同場屋每試牓出姚往往在朱上馮太尉京牓中二人俱赴廷入對未唱名前數日京師忽傳小試乃朱君殿試之作也姚謂人曰果爾縱不魁多士亦須在第一甲自嘆平時濫居其先及至魚龍變化之地便爾懸絶詣術士以二人命率質之亦訪容師未見殿唱日禁門未開曈曨未明或云曉容立茶肆中姚聞之走覔容果與一白袍偶坐姚連揖懇容略屈鄰邸一觀氣色容指偶坐者曰狀元已在此何勞他閲偶坐者馮當世京也姚力挽之容不得已為就鄰邸燈火下視之曰姚第幾甲朱第幾甲言訖復還前肆相次辨色入聴臚傳皆如師言朱正夫臨年未四十以大理寺丞致仕居吳興城迺取訓詞中仰而高風之語作仰高亭於城上常杜門謝客忽一日曉容自京師來謁公欣然接之是時二子行中久中秋試不利皆在侍下公强使冠帶而出容一見驚起賀曰後舉狀元也睥睨久之徑辭去公留之不可問以何適容曰老僧自此不復更閲人便徃杭州六和寺求一小室閒坐以待科場開乃西游爾公初未之信後三年春久中薄游㑹稽謀赴舉之資潮船絶江暮至六和才泊㟁見容在寺門遙揖久中歸與之欵因叩伯仲行期久中告之師曰某是月亦當離杭矣久中至家道之公笑且恠其任術之篤如此是秋至京師二朱舍開寶塔寺容寓智海禪刹相次行中預薦明年省闈優等惟殿試病作不能執筆是時王氏之學士人未多得時行中獨記其詩義最詳因信筆寫以答所問極不如意卷上日方午遂經御覽神宗良愛之行中不知也日與同舍蔡冲允蹈丁葆光經圍棋每拈子欲下必罵曰賊秃蓋恨容許之誤也未唱名前數日有士人通謁行中方棋遽使人卻之須㬰謁者又至且云見朱先輩行中叱其僕曰此必有下第舉人欲丐出闗之資吾捐悶中誰能見之然士人立於門不肯去冲允曰事不可知何惜一見行中乃出延之坐不暇寒溫揖行中起附耳而語曰乃梁御藥門客御藥特令奉報足下卷子上已置在魁等他日幸相記行中唯唯而入再執棋子手輒顫縁寵辱交戰不能自持冲允覺而叩之具述士人之言冲允曰曾詢梁氏所居否曰不曾或曰在州西急賃馬偕往欲審其事至梁門日已曛度不能返遂復歸而行中念容獨往智海宿容聞其來迎門握手曰非晩唱名何為來見老僧必是得甚消息來行中曰久不相見略來問訊爾師曰胡不寔告我馮當世未唱名時氣象亦如此行中知不可欺因道梁氏之事師喜甚為開尊設具且曰吾奉許固有素只有一人未見爾當為邀來同飲仍戒曰此人藍縷不可倨見亦不得發問問則彼行矣燭至師引寺廊一丐者入見行中不甚為禮便據上坐相與飲酒斗餘不交一談師徐曰此子當唱名先生能一留目否丐者曰爾曰何師曰已定他冠多士丐者擺頭曰第二人躡行中足使起宻徵其意但曰偶數多更無他語遂罷去明日飯罷率行中寺庭閒步出門遙見余行老亦入寺師不覺拊髀驚謂行中曰始吾見子以為天下之美盡此矣不知乃有此人行中曰此常州小余也某識之何遽及是師曰子正怕此人昨日聞偶多之説今又覩此人兹事可知矣蓋行中發解過省皆在二數及聽臚行老果第一行中次之行中解褐了往謝師師勞之曰子誠福人今日日辰以法推之魁天下者官不顯子至侍從其後余止館職知湖州卒行老名中服行中至中書舍人尚書右丞胡宗愈夫人丁氏司封員外郎宗臣之女自幼穎慧無所不能其善相人蓋出天性在西府時常於窗隙遙見蔡丞相確謂右丞曰蔡相全似盧多遜或以盧蔡肥瘠色貎不同詰之丁氏曰吾雖不及見盧但常一觀其畫像與今丞相神彩相似爾後蔡果南竄又戸部尚書李常除老龍尹成都塗中貽右丞書丁氏一見其字畫驚曰此人身筆已倒不久數盡須病咽喉而死李公行次鳳翔中毒而卒如此之𩔖不一初司封有楊妃數美人真挂後堂丁氏年未笄每晨興省問尊親了必戲道諸妃萬福一日潘妃忽荅云夫人萬福家人輩大恠之欲毁其真惟其叔寶臣令勿毁此女他日未可量也鄉人多能道其事陸軫日記天聖中陸同判衢州一旦早起覺印堂癢以手揣之司空部上有肉突起如指面大兩日漸堅實又至兩月天庭亦然又一日天部輔角部亦然又兩月左右龍角骨起映得印堂甚低當月印堂連山根起與二龍角相應相次左右眉稜連額角每以相書考驗此諸部骨起皆主封侯公相之貴然公官不過吏部郎中直昭文館典數郡而已其後孫佃入政府贈公官至司空以此知之贈官亦不虚也金壇郎王裕福唐人術數頗工又常云天運四百二十年一周而七百甲子備位天地人江河海鬼凡七今正行鬼後十八年復行天當有異人應時而出又云唐明皇時正行天元故也蜀人石藏用以醫術游都城其名甚著餘杭人陳承亦以醫顯然石好用煖藥陳好用凉藥古之良藥必量人虚實察病之隂陽而後投之湯劑或補或瀉各隨其症二子乃執偏見一槩於冷煖而皆有稱於一時何也俗語云藏用檐頭三斗火陳承篋裡一盤氷服金石藥者潜假藥力以濟其欲然多諱而不肯言一日疾作雖欲諱不可得也吳興吳景淵刑部服硫黄人罕有知者其後二十年子槖為華亭市易官發背而卒乃知流毒傳氣尚及其子可不戒哉古之賢人不在朝廷必在醫卜之中今之醫者或急於財利率用詭道以刼流俗殆與穴坯扶刅之徒同予目擊二事今書之以為世警舅氏王居安秀才久苦痔疾聞蕭山有善工力不能招致遂命舟自烏墩走錢塘舍於靜邸中使人迎醫醫絶江一潮至杭旣見忻然為藥劑且云但安心請以五日為期可以永除根本初以一藥放下大腸數寸又以藥版之徐用藥線一條結痔信宿痔果脱去其大如桃復用藥餌調養數日遂安然工初無難色但放下大腸了方議報謝之物病者知命懸其手直盡許以槖中所有為酬方肯治療又一妻兄迪功郎周僅調官京師舊患膀胱氣外腎偏墜有貨藥人自云能治立談間可使之正約以萬錢及三縑為報相次入室中施一針所苦果平周大喜即如數付金帛而去後半月其疾依舊使人訪醫者已不見矣王捷燒金先用毒蛇不計多少煞埋庭中澆以米泔令生菌因取合藥後造宅築基得一蛇頭如人形捷不久卒錢遹婺州浦江農家子少力學舉省殿牓皆占上等雖歴華要不妨治生浦江宅在深村衆山環繞一水縈帶隂陽家云法當富貴兩得後又侈大其宅買田至數萬畝只有一子名楚老極少俊遹所鍾愛作中丞時楚老病且革遹是日適欲攻時相與後來者為地亟趨對不顧病者遹上馬時楚老死其後謫辭有􅈱􅈱之語蓋譏其忍政和初以八座出帥越因臺章領宫祠遂不復起所至郡㕔前一鴉鳴必責守兵掩捕盡其種𩔖乃已常自云好殺乃天性推捕鴉之事可以知其他青溪賊作遹徑走越州越守劉韐閉城不納却歸村居為亂兵所害而焚其宅也陸軫云天聖中侍中馮拯薨次年京城南錫慶院側人家生一驢腹下白毛成馮拯二字馮氏以金贖之潜育於槽中四方皆知之和州烏江縣高望鎮升中寺真宗登封曾此駐蹕因賜寺額僧有負主僧金久而不償病且革誓為畜産以報旣卒主僧晝寢夢病僧披衣蹣跚入牀下覺而異之須㬰猫生一子稍長極馴擾其重七八觔每客至則歡迎走報見非其人者輒𦂳隨人有知呼其前名必怒噬至主僧呼則昂首號呌若求隱其事者衆生業報非一此猫特顯者爾宣和二年十月睦州青溪縣堨村居人方臘託左道以惑衆知縣事承議郎陳光不即鉏治臘自號聖公改元永樂置偏裨將以巾飾為别自紅巾而上凡六等無甲胄惟以鬼神詭秘事相扇摇數日聚惡少千餘焚民居掠金帛子女提㸃刑獄張苑通判州事葉居中不能招致欲盡殺之以故賊得脅虜良民為兵旬日有衆數萬十一月二十九日將領蔡遵與戰於息坑死之遂陷青溪縣十二月四日陷睦州初七日天章閣待制歙守曾孝蘊以京東賊宋江等出青齊山濮間有㫖移知青社一宗室通判州事守禦無䇿十三日又陷歙州乘勢取桐廬新城富陽等縣二十九日進逼杭州知州事趙霆棄城走州即陷節制直龍圖閣陳建亷訪使者趙約被害賊縱火六日官吏居民死者十三朝廷遣領樞宻院童貫常徳軍節度使譚稹二中貴率禁旅及京畿闗右河東蕃漢兵制置江淮二浙明年正月二十四日賊將七佛引衆六萬攻秀州統軍王子武聚兵與州民登城固守屬大兵至開門表裏合擊斬首九千築京觀五賊退據杭二月七日前鋒至清河堰賊列陣以待王師水陸並進戰六日斬賊二萬十八日再火官舍學宫府庫與僧民之居經夕不絶翌日宵遁大兵入城當是時少保劉延废由江東入至宣州涇縣遇賊偽八大王斬五千級復歙州出賊背統制王稟王渙楊惟忠辛興宗自杭趨睦取睦州與江東兵合斬獲七百級生擒方臘及偽相方肥等妻印子毫二太子凡五十二人毫二太子其子之號於梓桐石穴中殺賊七萬招來老幼四十餘萬復使歸業四月二十六日也餘黨走衢婺而蘭溪縣靈山賊朱言吳邦起應之據處州而越州剡縣魔賊仇道人台州仙居人吕師囊方品山賊陳十四公等起兵略溫台諸縣四年三月討平之是役也用兵十五萬斬賊十五萬自出師至凱旋凡四百五十日收杭睦歙處衢婺六州與五十二縣所殺平民不下二百萬始唐永徽四年睦州女子陳碩真反自稱文佳皇帝婺州刺史崔義𤣥平之故梓桐相傳有天子基萬年樓方臘因得憑藉以起又以沙門寶誌䜟記誘惑愚民而貧窮游手之徒相乗為亂青溪為睦大邑梓桐幫源等號山谷幽僻處東北趨睦西近歙民物繁庶有漆楮林木之饒富商巨賈多往來江浙地勢迂險賊一旦焚蕩無一存者羣黨據險以守因謂之洞而浙人安習太平不識兵革一聞金皷聲則斂手聴命不逞小民往往反為賊鄉導刼富室殺官吏士人以邀貨利渠魁未授首間所掠婦女自洞逃出倮而雉經於林中者由湯嵓榴樹嶺一帶凡八十五里九村山谷相望不知凡㡬㑹稽進士沈傑常領部民深入賊境親覩其事為余言賊之始末因稽合衆論摭其實著於篇青溪知縣陳光旣坐不治賊就戮朝廷改睦為嚴州歙為徽州自青溪界至歙州路皆鳥道縈紆兩傍峭壁萬仞僅通單車方臘之亂曾待制出守但以兩崖上駐兵防遏下瞰來路雖蚍蜉之微皆可數賊亦不敢犯境宋江擾京東曾公移守青社掌兵者以霧毒為辭移屯山谷間州遂陷後漢張角張燕輩託天師道陵為逺祖立祭酒治病使人出米五斗而病遂愈謂之五斗米道至其滋盛則剽刼州縣無所不為至今喫菜事魔夜聚曉散者是也凡魔拜必北向以張角寔起於北方觀其拜足以知其所宗原其平時不飲酒食肉甘枯槁趨靜黙若有志於為善者然男女無别不事耕織衣食無所得輒務攘奪以逞亂其可不早辨之乎有以其疑似難識欲痛繩之恐其滋蔓因置而不問馴致禍變則陳光之於方臘是也有舍法令一切弗問但魔迹稍露則使屬邑盡驅之死地務絶其本源肅清境内而此曹急則據邑聚衆而反則越守劉韐之於仇賊是也仇破剡縣新昌上虞凡三縣此風日煽殆未易察也始知能上體國禁之嚴下念愚民之無辜迷入於此道不急不怠銷患於㝠㝠之中者良有司也廬州慎縣黃山連接無為軍壽州六安界蓋賊巢也山下居民千餘戸而藏賊以活者八百餘家賊間發官兵追蹤逐捕有數年不獲者泊宅編卷下
